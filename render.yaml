services:
  - type: web
    name: oss-sahayak-backend
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: npm run start --workspace=backend
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USERNAME
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: APP_BASE_URL
        sync: false

  - type: worker
    name: oss-sahayak-worker
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: npm run start --workspace=ingestion-worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USERNAME
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: GITHUB_TOKEN
        sync: false

  - type: web
    name: oss-sahayak-frontend
    env: static
    buildCommand: npm run build
    publishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
